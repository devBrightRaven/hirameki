name: Validate Commands

on:
  push:
    paths:
      - "commands/**"
      - "tests/**"
  pull_request:
    paths:
      - "commands/**"
      - "tests/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate command files
        run: python tests/validate_commands.py
